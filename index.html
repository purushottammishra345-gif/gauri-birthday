<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Gauri ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  /* Updated Background: Sunset Gradient */
  background: linear-gradient(135deg, #fffbeb, #ffe7c4, #fed7aa);
  overflow-x: hidden;
  text-align: center;
  color: #573100; /* Rich warm brown for text */
}

h1, h2, .shayari-text {
  font-family: 'Playfair Display', serif;
}

h1.big-name {
  color: #ea580c; /* Bright Sunset Orange */
}

h2 {
  color: #c2410c; /* Deeper Orange */
}

.page {
  display: none;
  min-height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 20px;
  box-sizing: border-box;
}

.active {
  display: flex;
}

.big-name {
  font-size: 3.5rem;
  margin-bottom: 10px;
  animation: zoomIn 1.5s ease;
}

@keyframes zoomIn {
  from {transform: scale(0);}
  to {transform: scale(1);}
}

.photo-frame {
  width: 280px;
  height: 380px;
  perspective: 1000px;
  box-shadow: 0 10px 25px rgba(234, 88, 12, 0.2); /* Orange subtle shadow */
  border-radius: 15px;
  margin-bottom: 20px;
}

.photo {
  width: 100%;
  height: 100%;
  border-radius: 15px;
  background-size: cover;
  background-position: center;
  transition: transform 0.8s;
  background-color: #fff; /* Placeholder if no photo */
}

.turn {
  transform: rotateY(180deg);
}

.shayari-text {
  font-size: 1.4rem;
  color: #78350f; /* Amber Brown */
  min-height: 80px;
  margin: 15px 0;
  padding: 0 10px;
  font-style: italic;
}

/* Highlighted lines in poetry */
.poetry-highlight {
  color: #fbbf24; /* Golden Yellow */
  font-weight: bold;
}

button {
  padding: 12px 30px;
  border-radius: 25px;
  border: none;
  /* Updated Button: Golden/Orange Glow */
  background: linear-gradient(135deg, #fbb03b, #ea580c);
  color: white;
  cursor: pointer;
  margin-top: 20px;
  font-size: 1rem;
  transition: 0.3s ease;
  box-shadow: 0 4px 10px rgba(234, 88, 12, 0.3);
}

button:hover {
  background: linear-gradient(135deg, #ea580c, #c2410c); /* Deeper orange on hover */
  box-shadow: 0 6px 15px rgba(234, 88, 12, 0.4);
}

.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
  z-index: -1;
}

@keyframes floatUp {
  0% {transform: translateY(0);}
  100% {transform: translateY(-100vh);}
}
</style>
</head>

<body>

<div class="page active">
  <h1 class="big-name">Gauri ❤️</h1>
  <p>Maybe I didn’t say it at the perfect time… but my heart never forgot you for a second.<br>
  You are my everything ❤️</p>
  <button onclick="nextPage()">Tap to continue 💫</button>
</div>

<div class="page">
  <h2>Our Moments 📸</h2>

  <div class="photo-frame">
    <div class="photo" id="photoDisplay"></div>
  </div>

  <p class="shayari-text" id="shayariDisplay"></p>

  <div style="display:flex; gap:10px;">
    <button onclick="changeContent()">Next Photo ❤️</button>
    <button onclick="nextPage()">Continue ➡️</button>
  </div>
</div>

<div class="page">
  <h1>Happy Birthday 🎂</h1>
  <p>You are my peace, my happiness, my forever ❤️</p>
  <button onclick="nextPage()">One more thing 🎁</button>
</div>

<div class="page">
  <h1>Click for Surprise 🎁</h1>
  <button onclick="showSurprise()">Click Me ❤️</button>
</div>

<div class="page" id="finalPage">
  <h1>❤️ Forever ❤️</h1>
  <img src="finalphoto.jpg" width="250" style="border-radius:15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1);">
  <p>I love you forever Gauri ❤️</p>
</div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<script>
let current = 0;
const pages = document.querySelectorAll('.page');

function nextPage() {
  pages[current].classList.remove('active');
  current++;
  if (current < pages.length) {
    pages[current].classList.add('active');
  }
}

/* Gallery Data (6 Photos + 6 Hindi Lines) */
const contentData = [
  { img: "photo1.jpg", text: "मलमल, रेशम, खद्दर अच्छा लगता है,<br>तुम जो पहनो तुम पर सब अच्छा लगता है।" },
  { img: "photo2.jpg", text: "<span class='poetry-highlight'>इतना अच्छा शायद ही कुछ लगता हो,<br>जितना तुमको छू कर अच्छा लगता है।</span>" },
  { img: "photo3.jpg", text: "हम तुम दोनों मिल कर दुनिया जीतेंगे,<br>हमको ऐसी धुन पर सब अच्छा लगता है।" },
  { img: "photo4.jpg", text: "तुम मुझको अच्छी लगती रहना, और सुनो,<br>तुम्हारा अच्छा लगना अच्छा लगता है।" },
  { img: "photo5.jpg", text: "मेरे हाथ की मेहनत तेरे काम आए,<br>मुझको अपने घर पर सब अच्छा लगता है।" },
  { img: "photo6.jpg", text: "इकराम अब मैं सबको अच्छा लगता हूँ,<br>उसको मुझमें अक्सर सब अच्छा लगता है।" }
];

let dataIndex = 0;
const photoDiv = document.getElementById("photoDisplay");
const textDiv = document.getElementById("shayariDisplay");

// Set initial content
window.onload = function () {
  photoDiv.style.backgroundImage = `url(${contentData[0].img})`;
  textDiv.innerHTML = contentData[0].text;
};

function changeContent() {
  photoDiv.classList.add("turn");
  
  setTimeout(() => {
    dataIndex = (dataIndex + 1) % contentData.length;
    photoDiv.style.backgroundImage = `url(${contentData[dataIndex].img})`;
    textDiv.innerHTML = contentData[dataIndex].text;
    photoDiv.classList.remove("turn");
  }, 400);
}

/* Music */
document.body.addEventListener("click", function () {
  let music = document.getElementById("bgMusic");
  if (music) music.play();
}, { once: true });

/* Hearts (Now Golden/Orange) */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  
  // Randomly choose between a yellow or orange heart
  const colors = ["#fbbf24", "#ea580c"]; // Golden Yellow or Sunset Orange
  heart.style.color = colors[Math.floor(Math.random() * colors.length)];
  
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 400);

/* Final Page */
function showSurprise() {
  pages[current].classList.remove('active');
  document.getElementById('finalPage').classList.add('active');
}
</script>

</body>
</html>
