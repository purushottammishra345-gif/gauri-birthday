<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Gauri ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #e0f7fa);
  overflow: hidden;
  text-align: center;
}

.page {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.active {
  display: flex;
}

.big-name {
  font-size: 3rem;
  color: #ff4d6d;
  animation: zoomIn 2s ease;
}

@keyframes zoomIn {
  from {transform: scale(0);}
  to {transform: scale(1);}
}

button {
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: #ff8fab;
  color: white;
  cursor: pointer;
  margin-top: 20px;
}

.photo-frame {
  width: 250px;
  height: 350px;
  perspective: 1000px;
}

.photo {
  width: 100%;
  height: 100%;
  border-radius: 15px;
  background-size: cover;
  background-position: center;
  transition: transform 0.8s;
}

.turn {
  transform: rotateY(180deg);
}

.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
  color: #ff6b81;
}

@keyframes floatUp {
  0% {transform: translateY(0);}
  100% {transform: translateY(-100vh);}
}
</style>
</head>

<body>

<!-- Page 1 -->
<div class="page active">
  <h1 class="big-name">Gauri ❤️</h1>
  <p>Maybe I didn’t say it at the perfect time… but my heart never forgot you for a second.<br>
  You are my everything ❤️</p>
  <button onclick="nextPage()">Tap to continue 💫</button>
</div>

<!-- Page 2 -->
<div class="page">
  <h2>Our Moments 📸</h2>

  <div class="photo-frame">
    <div class="photo" id="photo"></div>
  </div>

  <button onclick="nextPhoto()">Next Photo ❤️</button>
  <button onclick="nextPage()">Continue ➡️</button>
</div>

<!-- Page 3 -->
<div class="page">
  <h1>Happy Birthday 🎂</h1>
  <p>You are my peace, my happiness, my forever ❤️</p>
  <button onclick="nextPage()">One more thing 🎁</button>
</div>

<!-- Page 4 -->
<div class="page">
  <h1>Click for Surprise 🎁</h1>
  <button onclick="showSurprise()">Click Me ❤️</button>
</div>

<!-- Final Page -->
<div class="page" id="finalPage">
  <h1>❤️</h1>
  <img src="finalphoto.jpg" width="250">
  <p>I love you forever ❤️</p>
</div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<script>
let current = 0;
const pages = document.querySelectorAll('.page');

function nextPage() {
  pages[current].classList.remove('active');
  current++;
  if (current < pages.length) {
    pages[current].classList.add('active');
  }
}

/* Photo Setup */
let photos = [
  "photo1.jpg",
  "photo2.jpg",
  "photo3.jpg",
  "photo4.jpg",
  "photo5.jpg",
  "photo6.jpg"
];

let index = 0;
let photoDiv;

/* Load after page */
window.onload = function () {
  photoDiv = document.getElementById("photo");
  if (photoDiv) {
    photoDiv.style.backgroundImage = `url(${photos[0]})`;
  }
};

function nextPhoto() {
  if (!photoDiv) return;

  photoDiv.classList.add("turn");

  setTimeout(() => {
    index = (index + 1) % photos.length;
    photoDiv.style.backgroundImage = `url(${photos[index]})`;
    photoDiv.classList.remove("turn");
  }, 400);
}

/* Music */
document.body.addEventListener("click", function () {
  let music = document.getElementById("bgMusic");
  if (music) music.play();
}, { once: true });

/* Hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 400);

/* Final Page */
function showSurprise() {
  pages[current].classList.remove('active');
  document.getElementById('finalPage').classList.add('active');
}
</script>

</body>
</html>
